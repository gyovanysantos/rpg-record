# Build and release SotDL RPG Recorder .exe on tag push.
#
# How to release:
#   1. Bump version in desktop-app/app/__version__.py
#   2. git commit -am "release: v0.2.0"
#   3. git tag v0.2.0
#   4. git push && git push --tags
#   → This workflow builds the .exe and creates a GitHub Release automatically.

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r desktop-app/requirements.txt

      - name: Install ffmpeg
        run: choco install ffmpeg -y

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build .exe with PyInstaller
        working-directory: desktop-app
        run: pyinstaller build.spec

      - name: Find built exe
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path desktop-app/dist -Filter "*.exe" -Recurse | Select-Object -First 1
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SotDL RPG Recorder ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: ${{ steps.find_exe.outputs.exe_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
