# Build and release RPG Record (Tauri v2) on tag push.
#
# How to release:
#   1. Update version in desktop-app-v2/src-tauri/tauri.conf.json
#   2. Update version in desktop-app-v2/src-tauri/Cargo.toml
#   3. git commit -am "release: v0.5.0"
#   4. git tag v0.5.0
#   5. git push && git push --tags
#   → This workflow builds the .msi/.exe and creates a GitHub Release automatically.

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop-app-v2/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop-app-v2
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-app-v2
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "RPG Record ${{ steps.version.outputs.tag }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
